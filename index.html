<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎰 Casino Pro</title>

<style>
body { font-family: Arial, sans-serif; text-align: center; background: black; color: white; }
button { padding: 10px; margin: 5px; border-radius: 10px; background: gold; }
.game { display: none; }
</style>
</head>
<body>

<h1>🎰 Casino Pro</h1>
<p>💰 Dinero: <span id="money">1000</span></p>

<h3>Juegos</h3>
<button onclick="showGame('slots')">🎰 Slots</button>
<button onclick="showGame('dice')">🎲 Dados</button>
<button onclick="showGame('online')">🌐 Online</button>

<h3>Extras</h3>
<button onclick="crime()">🚔 Crime</button>
<button onclick="award()">🎁 Award</button>

<input id="bet" value="100">

<div id="slots" class="game">
<h2>Slots</h2>
<p id="slotRes">-</p>
<button onclick="spin()">Girar</button>
</div>

<div id="dice" class="game">
<h2>Dados</h2>
<p id="diceRes">-</p>
<button onclick="rollDice()">Tirar</button>
</div>

<div id="online" class="game">
<h2>🌐 Jugadores reales</h2>
<ul id="onlineList"></ul>
</div>

<p id="result"></p>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH",
  databaseURL: "TU_DB_URL",
  projectId: "TU_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let playerName = localStorage.getItem("playerName");
if(!playerName){
  playerName = prompt("Tu nombre:");
  localStorage.setItem("playerName", playerName);
}

window.saveOnline = function(money){
  set(ref(db, "players/" + playerName), { money: money });
}

window.loadOnline = function(){
  onValue(ref(db, "players"), (snap)=>{
    let data = snap.val() || {};
    let list = document.getElementById("onlineList");
    list.innerHTML = "";
    for(let n in data){
      let li = document.createElement("li");
      li.innerText = n + " - 💰 " + data[n].money;
      list.appendChild(li);
    }
  });
}
</script>

<script>
let money = parseInt(localStorage.getItem("money")) || 1000;

function updateMoney(a=0){
  money += a;
  localStorage.setItem("money", money);
  document.getElementById("money").innerText = money;

  if(window.saveOnline) saveOnline(money);
}

function showGame(g){
  document.querySelectorAll('.game').forEach(x=>x.style.display='none');
  document.getElementById(g).style.display='block';
  if(g==="online" && window.loadOnline) loadOnline();
}

function getBet(){
  let b=parseInt(document.getElementById("bet").value);
  if(isNaN(b)||b<=0||b>money)return null;
  return b;
}

function spin(){
  let b=getBet(); if(!b)return;
  updateMoney(-b);
  if(Math.random()<0.3){ updateMoney(b*2); }
}

function rollDice(){
  let b=getBet(); if(!b)return;
  updateMoney(-b);
  if(Math.random()<0.5){ updateMoney(b*2); }
}

function crime(){
  if(Math.random()<0.4){ updateMoney(-2000); }
  else { updateMoney(Math.floor(Math.random()*4000)+5000); }
}

function award(){ updateMoney(2000); }

window.onload=()=>{ updateMoney(0); }
</script>

</body>
</html>
