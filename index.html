<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎰 Casino Ultra PRO</title>

<style>
body { font-family: Arial; text-align: center; background: black; color: white; }
button { padding: 10px; margin: 5px; border-radius: 10px; background: gold; }
button:disabled { background: gray; }
input { padding:5px; margin:5px; }
.game { display:none; margin-top:20px; }
#chatBox { max-height:200px; overflow-y:auto; border:1px solid white; padding:10px; }
</style>
</head>
<body>

<h1>🎰 Casino Ultra PRO</h1>

<!-- LOGIN -->
<div id="loginBox">
<h3>🔐 Login</h3>
<input id="username" placeholder="Nombre">
<button onclick="login()">Entrar</button>
</div>

<div id="casino" style="display:none">

<p>💰 Dinero: <span id="money">1000</span></p>

<h3>Juegos</h3>
<button onclick="showGame('slots')">🎰 Slots</button>
<button onclick="showGame('dice')">🎲 Dados</button>
<button onclick="showGame('online')">🌐 Online</button>
<button onclick="showGame('leaderboard')">🏆 Ranking</button>
<button onclick="showGame('chat')">💬 Chat</button>
<button onclick="showGame('transfer')">💸 Transferir</button>

<h3>Extras</h3>
<button id="btnCrime" onclick="crime()">🚔 Crime</button>
<button id="btnAward" onclick="award()">🎁 Award</button>
<button id="btnDaily" onclick="daily()">⭐ Daily</button>

<input id="bet" value="100">

<!-- ONLINE -->
<div id="online" class="game">
<h2>🌐 Jugadores</h2>
<ul id="onlineList"></ul>
</div>

<!-- RANKING -->
<div id="leaderboard" class="game">
<h2>🏆 Ranking</h2>
<ol id="topList"></ol>
</div>

<!-- CHAT -->
<div id="chat" class="game">
<h2>💬 Chat Global</h2>
<div id="chatBox"></div>
<input id="chatInput" placeholder="Mensaje">
<button onclick="sendMsg()">Enviar</button>
</div>

<!-- TRANSFER -->
<div id="transfer" class="game">
<h2>💸 Enviar dinero</h2>
<input id="toUser" placeholder="Usuario">
<input id="amount" placeholder="Cantidad">
<button onclick="sendMoney()">Enviar</button>
</div>

<div id="slots" class="game"><button onclick="spin()">Girar Slots</button></div>
<div id="dice" class="game"><button onclick="rollDice()">Tirar Dados</button></div>

<p id="result"></p>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, push, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
 apiKey:"TU_API_KEY",
 authDomain:"TU_AUTH",
 databaseURL:"TU_DB_URL",
 projectId:"TU_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.onValue = onValue;
window.push = push;
window.get = get;
</script>

<script>
let player = localStorage.getItem("player");
let money = parseInt(localStorage.getItem("money")) || 1000;

// LOGIN
function login(){
 let name=document.getElementById("username").value;
 if(!name) return;
 player=name;
 localStorage.setItem("player",name);
 document.getElementById("loginBox").style.display="none";
 document.getElementById("casino").style.display="block";
 init();
}

if(player){
 document.getElementById("loginBox").style.display="none";
 document.getElementById("casino").style.display="block";
 setTimeout(init,100);
}

function init(){
 updateMoney(0);
 loadPlayers();
 loadChat();
 updateCooldowns();
}

// DINERO
function updateMoney(a=0){
 money+=a;
 if(money<0) money=0;
 localStorage.setItem("money",money);
 document.getElementById("money").innerText=money;
 set(ref(db,"players/"+player),{money});
}

function msg(t){document.getElementById("result").innerText=t;}

function showGame(g){
 document.querySelectorAll('.game').forEach(x=>x.style.display='none');
 document.getElementById(g).style.display='block';
}

// JUEGOS
function getBet(){let b=parseInt(bet.value); if(isNaN(b)||b>money)return null; return b;}
function spin(){let b=getBet(); if(!b)return; updateMoney(-b); if(Math.random()<0.5)updateMoney(b*2);}
function rollDice(){let b=getBet(); if(!b)return; updateMoney(-b); if(Math.random()<0.5)updateMoney(b*2);}

// ONLINE + RANKING
function loadPlayers(){
 onValue(ref(db,"players"),snap=>{
  let data=snap.val()||{};
  onlineList.innerHTML="";
  let arr=Object.entries(data).sort((a,b)=>b[1].money-a[1].money);

  arr.forEach(p=>{
    let li=document.createElement("li");
    li.innerText=p[0]+" - 💰 "+p[1].money;
    onlineList.appendChild(li);
  });

  topList.innerHTML="";
  arr.slice(0,10).forEach(p=>{
    let li=document.createElement("li");
    li.innerText=p[0]+" - 💰 "+p[1].money;
    topList.appendChild(li);
  });
 });
}

// CHAT
function sendMsg(){
 let text=chatInput.value;
 if(!text) return;
 push(ref(db,"chat"),{user:player,msg:text});
 chatInput.value="";
}

function loadChat(){
 onValue(ref(db,"chat"),snap=>{
  let data=snap.val()||{};
  chatBox.innerHTML="";
  Object.values(data).slice(-20).forEach(m=>{
    let p=document.createElement("p");
    p.innerText=m.user+": "+m.msg;
    chatBox.appendChild(p);
  });
 });
}

// TRANSFERIR
async function sendMoney(){
 let to=toUser.value;
 let amt=parseInt(amount.value);
 if(!to||!amt||amt<=0||amt>money) return;

 let snap=await get(ref(db,"players/"+to));
 if(!snap.exists()){msg("No existe");return;}

 let other=snap.val().money||0;

 updateMoney(-amt);
 set(ref(db,"players/"+to),{money:other+amt});

 msg("Enviado 💸");
}

// COOLDOWNS
function format(ms){let s=Math.floor(ms/1000);let m=Math.floor(s/60);s%=60;return m+":"+ (s<10?"0":"")+s;}

function crime(){let n=Date.now(),t=localStorage.c||0;if(n<t)return;Math.random()<0.4?updateMoney(-2000):updateMoney(5000);localStorage.c=n+600000;}
function award(){let n=Date.now(),t=localStorage.a||0;if(n<t)return;updateMoney(2000);localStorage.a=n+420000;}
function daily(){let n=Date.now(),t=localStorage.d||0;if(n<t)return;updateMoney(10000);localStorage.d=n+86400000;}

function updateCooldowns(){
 let map=[["btnCrime","c","🚔"],["btnAward","a","🎁"],["btnDaily","d","⭐"]];
 map.forEach(x=>{
  let b=document.getElementById(x[0]);
  let t=localStorage[x[1]]||0;
  let d=t-Date.now();
  if(d>0){b.disabled=true;b.innerText=format(d);}
  else{b.disabled=false;}
 });
 setTimeout(updateCooldowns,1000);
}
</script>

</body>
</html>
