<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎰 Casino Pro PRO</title>

<style>
body { font-family: Arial; text-align: center; background: black; color: white; }
button { padding: 10px; margin: 5px; border-radius: 10px; background: gold; }
button:disabled { background: gray; }
.game { display: none; }
</style>
</head>
<body>

<h1>🎰 Casino PRO</h1>
<p>💰 Dinero: <span id="money">1000</span></p>

<h3>Juegos</h3>
<button onclick="showGame('slots')">🎰 Slots</button>
<button onclick="showGame('dice')">🎲 Dados</button>
<button onclick="showGame('online')">🌐 Online</button>
<button onclick="showGame('leaderboard')">🏆 Ranking</button>

<h3>Extras</h3>
<button id="btnCrime" onclick="crime()">🚔 Crime</button>
<button id="btnAward" onclick="award()">🎁 Award</button>
<button id="btnDaily" onclick="daily()">⭐ Daily</button>

<input id="bet" value="100">

<!-- ONLINE -->
<div id="online" class="game">
<h2>🌐 Jugadores</h2>
<ul id="onlineList"></ul>
</div>

<!-- RANKING -->
<div id="leaderboard" class="game">
<h2>🏆 Top jugadores</h2>
<ol id="topList"></ol>
</div>

<div id="slots" class="game"><h2>Slots</h2><button onclick="spin()">Girar</button></div>
<div id="dice" class="game"><h2>Dados</h2><button onclick="rollDice()">Tirar</button></div>

<p id="result"></p>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH",
  databaseURL: "TU_DB_URL",
  projectId: "TU_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let playerName = localStorage.getItem("playerName");
if(!playerName){
  playerName = prompt("Tu nombre:");
  localStorage.setItem("playerName", playerName);
}

// guardar
window.saveOnline = (money)=>{
  set(ref(db,"players/"+playerName),{money});
}

// lista jugadores
window.loadOnline = ()=>{
  onValue(ref(db,"players"),snap=>{
    let data=snap.val()||{};
    let list=document.getElementById("onlineList");
    list.innerHTML="";
    for(let n in data){
      let li=document.createElement("li");
      li.innerText=n+" - 💰 "+data[n].money;
      list.appendChild(li);
    }

    // ranking
    let arr=Object.entries(data);
    arr.sort((a,b)=>b[1].money-a[1].money);

    let top=document.getElementById("topList");
    top.innerHTML="";
    arr.slice(0,10).forEach(p=>{
      let li=document.createElement("li");
      li.innerText=p[0]+" - 💰 "+p[1].money;
      top.appendChild(li);
    });
  });
}
</script>

<script>
let money = parseInt(localStorage.getItem("money")) || 1000;

function updateMoney(a=0){
  money+=a;
  if(money<0) money=0;
  localStorage.setItem("money",money);
  document.getElementById("money").innerText=money;
  if(window.saveOnline) saveOnline(money);
}

function msg(t){document.getElementById("result").innerText=t;}

function showGame(g){
  document.querySelectorAll('.game').forEach(x=>x.style.display='none');
  document.getElementById(g).style.display='block';
  if(window.loadOnline) loadOnline();
}

function getBet(){
  let i=document.getElementById("bet").value;
  let b=(i.toLowerCase()==="a")?money:parseInt(i);
  if(isNaN(b)||b<=0||b>money)return null;
  return b;
}

// juegos
function spin(){let b=getBet();if(!b)return;updateMoney(-b);if(Math.random()<0.5)updateMoney(b*2);}
function rollDice(){let b=getBet();if(!b)return;updateMoney(-b);if(Math.random()<0.5)updateMoney(b*2);}

// cooldowns
function formatTime(ms){
  let s=Math.floor(ms/1000);
  let m=Math.floor(s/60);
  s=s%60;
  return m+":"+(s<10?"0":"")+s;
}

// Crime
function crime(){
  let now=Date.now();
  let next=localStorage.getItem("crime_cd")||0;
  if(now<next)return;

  if(Math.random()<0.4) updateMoney(-2000);
  else updateMoney(Math.floor(Math.random()*4000)+5000);

  localStorage.setItem("crime_cd",now+600000);
}

// Award
function award(){
  let now=Date.now();
  let next=localStorage.getItem("award_cd")||0;
  if(now<next)return;

  updateMoney(2000);
  localStorage.setItem("award_cd",now+420000);
}

// Daily
function daily(){
  let now=Date.now();
  let next=localStorage.getItem("daily_cd")||0;
  if(now<next)return;

  updateMoney(10000);
  localStorage.setItem("daily_cd",now+86400000);
}

// actualizar botones
function updateCooldowns(){
  const list=[
    {id:"btnCrime",key:"crime_cd",txt:"🚔 Crime"},
    {id:"btnAward",key:"award_cd",txt:"🎁 Award"},
    {id:"btnDaily",key:"daily_cd",txt:"⭐ Daily"}
  ];

  list.forEach(x=>{
    let btn=document.getElementById(x.id);
    let t=localStorage.getItem(x.key)||0;
    let diff=t-Date.now();

    if(diff>0){
      btn.disabled=true;
      btn.innerText=formatTime(diff);
    }else{
      btn.disabled=false;
      btn.innerText=x.txt;
    }
  });

  setTimeout(updateCooldowns,1000);
}

// INIT
window.onload=()=>{
  updateMoney(0);
  updateCooldowns();
  if(window.loadOnline) loadOnline();
}
</script>

</body>
</html>
