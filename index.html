<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino Pro 🎰</title>

<style>
body { 
    font-family: Arial, sans-serif; 
    text-align: center; 
    /* Imagen de fondo de mesa de póker */
    background: url('https://tcdn.com.br') no-repeat center center fixed; 
    background-size: cover;
    color: white; 
    margin: 0;
}

/* Capa de oscuridad para legibilidad */
.overlay {
    background: rgba(0, 0, 0, 0.75);
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;
}

button { 
    padding: 10px; margin: 5px; border-radius: 10px; background: gold; 
    border: none; font-weight: bold; cursor: pointer; transition: 0.2s;
}
button:hover { background: #e6c200; transform: scale(1.05); }
input { padding: 5px; width: 100px; text-align: center; border-radius: 5px; border: none; }
.game { display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 20px; }
#money { color: #00ff00; font-weight: bold; font-size: 1.3em; }
#result { font-weight: bold; color: gold; margin-top: 10px; }
</style>

</head>
<body>

<div class="overlay">
    <h1>🎰 Casino Pro</h1>
    <p>💰 Dinero: <span id="money">0</span></p>

    <h3>Juegos</h3>
    <button onclick="showGame('blackjack')">🃏 Blackjack</button>
    <button onclick="showGame('slots')">🎰 Slots</button>
    <button onclick="showGame('dice')">🎲 Dados</button>
    <button onclick="showGame('towers')">🏗️ Towers</button>
    <button onclick="showGame('leaderboard')">🏆 Ranking</button>

    <h3>Extras</h3>
    <button onclick="crime()">🚔 Crime</button>
    <button onclick="award()">🎁 Award</button>
    <button onclick="resetMoney()">💥 Reset</button>

    <p>Apuesta (poné "A" para todo):</p>
    <input type="text" id="bet" value="100">

    <!-- BLACKJACK -->
    <div id="blackjack" class="game">
        <h2>🃏 Blackjack</h2>
        <p>Jugador: <span id="pCards"></span> | Puntos: <span id="pScore"></span></p>
        <p>Crupier: <span id="dCards"></span> | Puntos: <span id="dScore"></span></p>
        <button onclick="startBJ()">Repartir</button>
        <button onclick="hit()">Pedir</button>
        <button onclick="stand()">Plantarse</button>
    </div>

    <!-- SLOTS -->
    <div id="slots" class="game">
        <h2>🎰 Slots</h2>
        <p id="slotRes" style="font-size: 2em;">🍒 🍋 🍊</p>
        <button onclick="spin()">Girar</button>
    </div>

    <!-- DADOS -->
    <div id="dice" class="game">
        <h2>🎲 Dados</h2>
        <p id="diceRes" style="font-size: 1.5em;">-</p>
        <button onclick="rollDice()">Tirar</button>
    </div>

    <!-- TOWERS -->
    <div id="towers" class="game">
        <h2>🏗️ Towers</h2>
        <p>Nivel: <span id="level">0</span> | Multiplicador: x<span id="mult">1</span></p>
        <button onclick="startTowers()">Empezar</button>
        <button onclick="nextLevel()">Subir</button>
        <button onclick="cashout()">Retirarse</button>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboard" class="game">
        <h2>🏆 Ranking</h2>
        <input id="playerName" placeholder="Tu nombre">
        <button onclick="saveScore()">Guardar</button>
        <ul id="scores" style="list-style: none; padding: 0;"></ul>
    </div>

    <p id="result"></p>
</div>

<script>
// DINERO CON PROTECCIÓN DE NEGATIVOS
let money = parseInt(localStorage.getItem("money")) || 0;

function updateMoney(amount = 0) {
  money += amount;
  if (money < 0) money = 0; // Evita saldo negativo
  localStorage.setItem("money", money);
  document.getElementById("money").innerText = money;
}

function resetMoney(){
  money = 0;
  updateMoney();
  msg("💥 Dinero reiniciado");
}

function showGame(game){
  document.querySelectorAll('.game').forEach(g=>g.style.display='none');
  document.getElementById(game).style.display='block';
}

function getBet(){
  let input = document.getElementById("bet").value;
  if(input.toLowerCase() === "a") return money;
  let bet = parseInt(input);
  if(isNaN(bet) || bet <= 0){ alert("Apuesta inválida"); return null; }
  if(bet > money){ alert("No tenés suficiente dinero"); return null; }
  return bet;
}

// BLACKJACK CON FIX DE REPARTO
let player=[], dealer=[], bjActive=false;

function card(){
  let c=[2,3,4,5,6,7,8,9,10,10,10,10,11];
  return c[Math.floor(Math.random()*c.length)];
}

function score(hand){
  let s=hand.reduce((a,b)=>a+b,0);
  let aces=hand.filter(x=>x===11).length;
  while(s>21 && aces>0){s-=10; aces--;}
  return s;
}

function startBJ(){
  if(bjActive) return msg("⚠️ Ya hay una partida. Terminala.");
  let bet=getBet(); if(!bet) return;
  player=[card(),card()];
  dealer=[card(),card()];
  bjActive=true;
  updateBJ();
  msg("🃏 Cartas repartidas...");
}

function hit(){
  if(!bjActive) return;
  player.push(card());
  if(score(player)>21) endBJ();
  updateBJ();
}

function stand(){
  if(!bjActive) return;
  while(score(dealer)<17) dealer.push(card());
  endBJ();
}

function endBJ(){
  bjActive = false;
  let bet=getBet();
  let p=score(player), d=score(dealer);

  if(p>21){ updateMoney(-bet); msg("💀 Perdiste"); }
  else if(d>21||p>d){ updateMoney(bet); msg("🔥 Ganaste"); }
  else if(p<d){ updateMoney(-bet); msg("❌ Perdiste"); }
  else msg("🤝 Empate");

  updateBJ();
}

function updateBJ(){
  document.getElementById("pCards").innerText=player.join(" ");
  document.getElementById("dCards").innerText= bjActive ? dealer[0] + " ?" : dealer.join(" ");
  document.getElementById("pScore").innerText=score(player);
  document.getElementById("dScore").innerText= bjActive ? "?" : score(dealer);
}

// SLOTS
function spin(){
  let bet=getBet(); if(!bet) return;
  let s=["🍒","🍋","🍊","⭐","💎"];
  let a=s[rand()],b=s[rand()],c=s[rand()];
  document.getElementById("slotRes").innerText=`${a} ${b} ${c}`;
  if(a===b && b===c){ updateMoney(bet*3); msg("🔥 Jackpot"); }
  else { updateMoney(-bet); msg("❌ Perdiste"); }
}

// DADOS
function rollDice(){
  let bet=getBet(); if(!bet) return;
  let d1=rand6(), d2=rand6();
  let total=d1+d2;
  document.getElementById("diceRes").innerText=`${d1}+${d2}=${total}`;
  if(total>=7){ updateMoney(bet); msg("🔥 Ganaste"); }
  else { updateMoney(-bet); msg("❌ Perdiste"); }
}

// TOWERS
let tLevel=0, mult=1, playingT=false;
function startTowers(){
  if(!getBet()) return;
  tLevel=0; mult=1; playingT=true;
  updateTowers();
  msg("🏗️ Empezaste Towers");
}

function nextLevel(){
  if(!playingT) return;
  if(Math.random()<0.3){
    updateMoney(-getBet());
    playingT=false; msg("💣 BOOM");
  } else {
    tLevel++; mult++; msg("✅ Piso seguro");
  }
  updateTowers();
}

function cashout(){
  if(!playingT) return;
  let win = Math.floor(getBet() * (mult - 1));
  updateMoney(win);
  playingT=false;
  msg("💰 Retiraste +" + win);
  updateTowers();
}

function updateTowers(){
  document.getElementById("level").innerText=tLevel;
  document.getElementById("mult").innerText=mult;
}

// EXTRAS
function crime(){
  let now = Date.now(), last = localStorage.getItem("lastCrime") || 0;
  if(now - last < 600000) return msg("⏳ Esperá 10 min");
  localStorage.setItem("lastCrime", now);
  if(Math.random()<0.4){ updateMoney(-2000); msg("🚔 Fallaste -2000"); }
  else { updateMoney(6000); msg("💰 Éxito +6000"); }
}

function award(){
  let now=Date.now(), last=localStorage.getItem("lastAward")||0;
  if(now-last<420000) return msg("⏳ Esperá 7 min");
  localStorage.setItem("lastAward", now);
  updateMoney(2000); msg("🎁 +2000");
}

// UTILIDADES
function rand(){return Math.floor(Math.random()*5);}
function rand6(){return Math.floor(Math.random()*6)+1;}
function msg(t){ document.getElementById("result").innerText=t; }

// RANKING
function saveScore(){
  let name=document.getElementById("playerName").value||"Anon";
  let scores=JSON.parse(localStorage.getItem("scores"))||[];
  scores.push({name,money});
  scores.sort((a,b)=>b.money-a.money);
  localStorage.setItem("scores",JSON.stringify(scores.slice(0,5)));
  showScores();
}

function showScores(){
  let scores=JSON.parse(localStorage.getItem("scores"))||[];
  let list=document.getElementById("scores");
  list.innerHTML = scores.map(s => `<li>${s.name} - 💰 ${s.money}</li>`).join("");
}

updateMoney();
showScores();
</script>

</body>
</html>
