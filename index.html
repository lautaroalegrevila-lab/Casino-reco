<!DOCTYPE html>
<html>
<head>
<title>🎰 Casino Pro</title>

<style>
body { 
    font-family: Arial, sans-serif; 
    text-align: center; 
    background: url('https://tcdn.com.br') no-repeat center center fixed; 
    background-size: cover;
    color: white; 
    margin: 0;
}

/* Overlay */
.overlay {
    background: rgba(0, 0, 0, 0.75);
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;
}

button { 
    padding: 10px; margin: 5px; border-radius: 10px; background: gold; 
    border: none; font-weight: bold; cursor: pointer; transition: 0.2s;
}
button:hover { background: #e6c200; transform: scale(1.05); }

input { padding: 5px; width: 100px; text-align: center; border-radius: 5px; border: none; }

.game { display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 20px; }

#money { color: #00ff00; font-weight: bold; font-size: 1.3em; }
#result { font-weight: bold; color: gold; margin-top: 10px; }
</style>

</head>
<body>

<div class="overlay">
    <h1>🎰 Casino Pro</h1>
    <p>💰 Dinero: <span id="money">0</span></p>

    <h3>Juegos</h3>
    <button onclick="showGame('blackjack')">🃏 Blackjack</button>
    <button onclick="showGame('slots')">🎰 Slots</button>
    <button onclick="showGame('dice')">🎲 Dados</button>
    <button onclick="showGame('towers')">🏗️ Towers</button>
    <button onclick="showGame('roulette')">🎰 Ruleta</button>
    <button onclick="showGame('leaderboard')">🏆 Ranking</button>

    <h3>Extras</h3>
    <button onclick="crime()">🚔 Crime</button>
    <button onclick="award()">🎁 Award</button>
    <button onclick="resetMoney()">💥 Reset</button>

    <p>Apuesta (poné "A" para todo):</p>
    <input type="text" id="bet" value="100">

    <!-- BLACKJACK -->
    <div id="blackjack" class="game">
        <h2>🃏 Blackjack</h2>
        <p>Jugador: <span id="pCards"></span> | Puntos: <span id="pScore"></span></p>
        <p>Crupier: <span id="dCards"></span> | Puntos: <span id="dScore"></span></p>
        <button onclick="startBJ()">Repartir</button>
        <button onclick="hit()">Pedir</button>
        <button onclick="stand()">Plantarse</button>
    </div>

    <!-- SLOTS -->
    <div id="slots" class="game">
        <h2>🎰 Slots</h2>
        <p id="slotRes" style="font-size: 2em;">🍒 🍋 🍊</p>
        <button onclick="spin()">Girar</button>
    </div>

    <!-- DADOS -->
    <div id="dice" class="game">
        <h2>🎲 Dados</h2>
        <p id="diceRes" style="font-size: 1.5em;">-</p>
        <button onclick="rollDice()">Tirar</button>
    </div>

    <!-- TOWERS -->
    <div id="towers" class="game">
        <h2>🏗️ Towers</h2>
        <p>Nivel: <span id="level">0</span> | Multiplicador: x<span id="mult">1</span></p>
        <button onclick="startTowers()">Empezar</button>
        <button onclick="nextLevel()">Subir</button>
        <button onclick="cashout()">Retirarse</button>
    </div>

    <!-- RULETA -->
    <div id="roulette" class="game">
        <h2>🎰 Ruleta</h2>

        <p style="font-size:1.5em;">
            🎯 Número: <span id="rNumber">-</span>
        </p>
        <p>
            🎨 Color: <span id="rColor">-</span>
        </p>

        <input id="rInput" placeholder="0-36">

        <br><br>

        <button onclick="playRoulette('rojo')">🔴 Rojo</button>
        <button onclick="playRoulette('negro')">⚫ Negro</button>
        <button onclick="playRoulette('numero')">🎯 Número</button>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboard" class="game">
        <h2>🏆 Ranking</h2>
        <input id="playerName" placeholder="Tu nombre">
        <button onclick="saveScore()">Guardar</button>
        <ul id="scores" style="list-style: none; padding: 0;"></ul>
    </div>

    <p id="result"></p>
</div>

<script>
let money = parseInt(localStorage.getItem("money")) || 0;

function updateMoney(amount = 0) {
  money += amount;
  if (money < 0) money = 0;
  localStorage.setItem("money", money);
  document.getElementById("money").innerText = money;
}

function resetMoney(){
  money = 0;
  updateMoney();
  msg("💥 Dinero reiniciado");
}

function showGame(game){
  document.querySelectorAll('.game').forEach(g=>g.style.display='none');
  document.getElementById(game).style.display='block';
}

function getBet(){
  let input = document.getElementById("bet").value;
  if(input.toLowerCase() === "a") return money;
  let bet = parseInt(input);
  if(isNaN(bet) || bet <= 0){ alert("Apuesta inválida"); return null; }
  if(bet > money){ alert("No tenés suficiente dinero"); return null; }
  return bet;
}

// RULETA
function playRoulette(type){
  let bet = getBet(); 
  if(!bet) return;

  let number = Math.floor(Math.random()*37);
  let isRed = number % 2 === 1;
  let color = number === 0 ? "verde" : (isRed ? "rojo" : "negro");

  document.getElementById("rNumber").innerText = number;
  document.getElementById("rColor").innerText = color;

  if(type === "rojo"){
    color === "rojo" ? updateMoney(bet) : updateMoney(-bet);
  }
  else if(type === "negro"){
    color === "negro" ? updateMoney(bet) : updateMoney(-bet);
  }
  else if(type === "numero"){
    let choice = parseInt(document.getElementById("rInput").value);
    if(isNaN(choice) || choice < 0 || choice > 36){
      return msg("⚠️ Número inválido");
    }
    choice === number ? updateMoney(bet*35) : updateMoney(-bet);
  }

  msg("🎰 Salió " + number + " (" + color + ")");
}

// UTIL
function rand(){return Math.floor(Math.random()*5);}
function rand6(){return Math.floor(Math.random()*6)+1;}
function msg(t){ document.getElementById("result").innerText=t; }

updateMoney();
</script>

</body>
</html>
