<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎰 Casino Funcional</title>

<style>
body { font-family: Arial; text-align:center; background:black; color:white; }
button { padding:10px; margin:5px; border-radius:10px; background:gold; }
button:disabled { background:gray; }
.game { display:none; margin-top:20px; }
</style>
</head>
<body>

<h1>🎰 Casino</h1>
<p>💰 Dinero: <span id="money">1000</span></p>

<h3>Juegos</h3>
<button onclick="showGame('slots')">🎰 Slots</button>
<button onclick="showGame('dice')">🎲 Dados</button>
<button onclick="showGame('towers')">🏗️ Towers</button>
<button onclick="showGame('blackjack')">🃏 Blackjack</button>

<h3>Extras</h3>
<button id="crimeBtn" onclick="crime()">🚔 Crime</button>
<button id="awardBtn" onclick="award()">🎁 Award</button>
<button id="dailyBtn" onclick="daily()">⭐ Daily</button>

<br><br>
<input id="bet" value="100">

<!-- JUEGOS -->
<div id="slots" class="game">
<h2>Slots</h2>
<button onclick="slots()">Girar</button>
</div>

<div id="dice" class="game">
<h2>Dados</h2>
<button onclick="dice()">Tirar</button>
</div>

<div id="towers" class="game">
<h2>Towers</h2>
<p>Nivel: <span id="level">0</span> | x<span id="mult">1</span></p>
<button onclick="startTowers()">Start</button>
<button onclick="nextTower()">Subir</button>
<button onclick="cashout()">Cobrar</button>
</div>

<div id="blackjack" class="game">
<h2>Blackjack</h2>
<p id="bj"></p>
<button onclick="playBJ()">Jugar</button>
</div>

<p id="msg"></p>

<script>
let money = parseInt(localStorage.getItem("money")) || 1000;
let tBet=0, level=0, mult=1;

// UI
function updateMoney(v=0){
 money+=v;
 if(money<0) money=0;
 localStorage.setItem("money",money);
 document.getElementById("money").innerText=money;
}
function msg(t){document.getElementById("msg").innerText=t;}

function showGame(g){
 document.querySelectorAll(".game").forEach(x=>x.style.display="none");
 document.getElementById(g).style.display="block";
}

function getBet(){
 let b=document.getElementById("bet").value;
 if(b.toLowerCase()=="a") return money;
 b=parseInt(b);
 if(isNaN(b)||b<=0||b>money) return null;
 return b;
}

// 🎰 SLOTS
function slots(){
 let b=getBet(); if(!b) return;
 updateMoney(-b);
 if(Math.random()<0.4){ updateMoney(b*3); msg("🎉 Jackpot"); }
 else msg("Perdiste");
}

// 🎲 DADOS
function dice(){
 let b=getBet(); if(!b) return;
 updateMoney(-b);
 if(Math.random()<0.5){ updateMoney(b*2); msg("Ganaste"); }
 else msg("Perdiste");
}

// 🏗️ TOWERS
function startTowers(){
 let b=getBet(); if(!b) return;
 updateMoney(-b);
 tBet=b; level=0; mult=1;
 updateT();
}
function nextTower(){
 if(!tBet) return;
 if(Math.random()<0.7){
  level++;
  mult+=0.5;
  updateT();
 }else{
  msg("💥 Perdiste");
  tBet=0;
 }
}
function cashout(){
 if(tBet>0){
  updateMoney(Math.floor(tBet*mult));
  msg("💰 Cobraste");
  tBet=0;
 }
}
function updateT(){
 document.getElementById("level").innerText=level;
 document.getElementById("mult").innerText=mult.toFixed(2);
}

// 🃏 BLACKJACK SIMPLE
function playBJ(){
 let b=getBet(); if(!b) return;
 updateMoney(-b);
 let p=Math.floor(Math.random()*10)+12;
 let d=Math.floor(Math.random()*10)+12;
 document.getElementById("bj").innerText="Jugador "+p+" vs Dealer "+d;
 if(p>21 || (d<=21 && d>=p)){ msg("Perdiste"); }
 else { updateMoney(b*2); msg("Ganaste"); }
}

// ⏳ COOLDOWN
function format(ms){
 let s=Math.floor(ms/1000);
 let m=Math.floor(s/60);
 s%=60;
 return m+":"+(s<10?"0":"")+s;
}

function crime(){
 let now=Date.now();
 let next=localStorage.getItem("crime")||0;
 if(now<next) return;

 if(Math.random()<0.4){
  updateMoney(-2000);
  msg("🚔 Fallaste");
 }else{
  let w=Math.floor(Math.random()*4000)+5000;
  updateMoney(w);
  msg("💰 +"+w);
 }

 localStorage.setItem("crime", now+600000);
}

function award(){
 let now=Date.now();
 let next=localStorage.getItem("award")||0;
 if(now<next) return;

 updateMoney(2000);
 msg("🎁 +2000");

 localStorage.setItem("award", now+420000);
}

function daily(){
 let now=Date.now();
 let next=localStorage.getItem("daily")||0;
 if(now<next) return;

 updateMoney(10000);
 msg("⭐ +10000");

 localStorage.setItem("daily", now+86400000);
}

function updateCooldowns(){
 let list=[
  ["crimeBtn","crime","🚔 Crime"],
  ["awardBtn","award","🎁 Award"],
  ["dailyBtn","daily","⭐ Daily"]
 ];

 list.forEach(x=>{
  let btn=document.getElementById(x[0]);
  let t=localStorage.getItem(x[1])||0;
  let diff=t-Date.now();

  if(diff>0){
   btn.disabled=true;
   btn.innerText=format(diff);
  }else{
   btn.disabled=false;
   btn.innerText=x[2];
  }
 });

 setTimeout(updateCooldowns,1000);
}

// INIT
window.onload=()=>{
 updateMoney(0);
 updateCooldowns();
}
</script>

</body>
</html>
