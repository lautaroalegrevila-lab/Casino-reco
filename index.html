<!DOCTYPE html>
<html>
<head>
<title>🎰 Casino Pro</title>
<style>
    body { font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; }
    .overlay { background: rgba(0, 0, 0, 0.85); min-height: 100vh; padding: 20px; box-sizing: border-box; }
    button { padding: 10px; margin: 5px; border-radius: 10px; background: gold; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; min-width: 100px; }
    button:hover { background: #e6c200; transform: scale(1.05); }
    button:disabled { background: #555; cursor: not-allowed; transform: none; }
    input { padding: 5px; width: 100px; text-align: center; border-radius: 5px; border: none; }
    .game { display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 20px; }
    #money { color: #00ff00; font-weight: bold; font-size: 1.3em; }
    #result { font-weight: bold; color: gold; margin-top: 10px; min-height: 1.2em; }
</style>
</head>
<body>

<div class="overlay">
    <h1>🎰 Casino Pro</h1>
    <p>💰 Dinero: <span id="money">1000</span></p>

    <h3>Juegos</h3>
    <button onclick="showGame('blackjack')">🃏 Blackjack</button>
    <button onclick="showGame('slots')">🎰 Slots</button>
    <button onclick="showGame('dice')">🎲 Dados</button>
    <button onclick="showGame('towers')">🏗️ Towers</button>
    <button onclick="showGame('roulette')">🎰 Ruleta</button>

    <h3>Extras</h3>
    <button id="btnCrime" onclick="crime()">🚔 Crime</button>
    <button id="btnAward" onclick="award()">🎁 Award</button>
    <button onclick="resetMoney()">💥 Reset</button>

    <p>Apuesta (poné "A" para todo):</p>
    <input type="text" id="bet" value="100">

    <!-- Secciones de juegos (simplificadas para el ejemplo funcional) -->
    <div id="blackjack" class="game"><h2>🃏 Blackjack</h2><p>Puntos: <span id="pScore">0</span></p><button onclick="startBJ()">Repartir</button><button onclick="stand()">Plantarse</button></div>
    <div id="slots" class="game"><h2>🎰 Slots</h2><p id="slotRes" style="font-size: 2em;">🍒 🍋 🍊</p><button onclick="spin()">Girar</button></div>
    <div id="dice" class="game"><h2>🎲 Dados</h2><p id="diceRes" style="font-size: 1.5em;">-</p><button onclick="rollDice()">Tirar</button></div>
    <div id="towers" class="game"><h2>🏗️ Towers</h2><p>Nivel: <span id="level">0</span> | x<span id="mult">1</span></p><button onclick="startTowers()">Subir</button><button onclick="cashout()">Retirarse</button></div>
    <div id="roulette" class="game"><h2>🎰 Ruleta</h2><input id="rInput" placeholder="0-36"><br><button onclick="playRoulette('rojo')">🔴 Rojo</button><button onclick="playRoulette('negro')">⚫ Negro</button></div>

    <p id="result"></p>
</div>

<script>
let money = parseInt(localStorage.getItem("money")) || 1000;

function updateMoney(amount = 0) {
    money += amount;
    if (money < 0) money = 0;
    localStorage.setItem("money", money);
    document.getElementById("money").innerText = money;
}

function msg(t) { document.getElementById("result").innerText = t; }

function showGame(game) {
    document.querySelectorAll('.game').forEach(g => g.style.display = 'none');
    document.getElementById(game).style.display = 'block';
}

function getBet() {
    let input = document.getElementById("bet").value;
    let val = (input.toLowerCase() === "a") ? money : parseInt(input);
    if (isNaN(val) || val <= 0 || val > money) { alert("Fondos insuficientes o apuesta inválida"); return null; }
    return val;
}

// --- LÓGICA DE EXTRAS (Tus pedidos específicos) ---

function award() {
    const btn = document.getElementById("btnAward");
    // Monto entre 2000 y 5000
    let premio = Math.floor(Math.random() * (5000 - 2000 + 1)) + 2000;
    updateMoney(premio);
    msg(`🎁 ¡Bono reclamado! +$${premio}`);
    
    iniciarCooldown(btn, 420, "🎁 Award"); // 7 minutos = 420 seg
}

function crime() {
    const btn = document.getElementById("btnCrime");
    
    // 40% de que salga mal (Math.random() < 0.4)
    if (Math.random() >= 0.4) {
        // ÉXITO: 1000 a 9000
        let botin = Math.floor(Math.random() * (9000 - 1000 + 1)) + 1000;
        updateMoney(botin);
        msg(`🔫 ¡Robo exitoso! Ganaste $${botin}`);
    } else {
        // FALLO
        let multa = 1000;
        updateMoney(-multa);
        msg(`🚔 ¡La policía te atrapó! Perdiste $${multa}`);
    }

    iniciarCooldown(btn, 600, "🚔 Crime"); // 10 minutos = 600 seg
}

function iniciarCooldown(boton, segundos, textoOriginal) {
    boton.disabled = true;
    let restante = segundos;
    
    let loop = setInterval(() => {
        let m = Math.floor(restante / 60);
        let s = restante % 60;
        boton.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        restante--;

        if (restante < 0) {
            clearInterval(loop);
            boton.disabled = false;
            boton.innerText = textoOriginal;
        }
    }, 1000);
}

// --- LOGICA SIMPLE DE JUEGOS ---
function spin() { let b = getBet(); if(b) { let win = Math.random() > 0.7; if(win) { updateMoney(b*5); msg("🎰 ¡GANASTE!"); } else { updateMoney(-b); msg("🎰 Perdiste"); } } }
function rollDice() { let b = getBet(); if(b) { let d = Math.floor(Math.random()*6)+1; document.getElementById("diceRes").innerText = d; if(d > 3) { updateMoney(b); msg("🎲 Ganaste!"); } else { updateMoney(-b); msg("🎲 Perdiste"); } } }
function resetMoney() { money = 1000; updateMoney(0); msg("Reset realizado"); }

updateMoney(0);
</script>
</body>
</html>
